<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>GameFeed Sponsored Placement</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #090611;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .placement {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 36px 22px 22px;
        background:
          radial-gradient(circle at 10% 10%, #00d9ff22, transparent 38%),
          radial-gradient(circle at 90% 90%, #ff3bdd28, transparent 40%),
          #090611;
        text-align: center;
      }
      .offer { max-width: 310px; }
      .offer strong { display: block; margin-bottom: 8px; font-size: 18px; }
      .offer span { color: #aaa4bd; font-size: 12px; line-height: 1.5; }
      .offer a {
        min-height: 42px;
        margin-top: 18px;
        padding: 0 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: linear-gradient(100deg, #00d9ff, #7b35ff 50%, #ff3bdd);
        color: white;
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="placement" id="ad-placement" aria-label="Sponsored content">
      <div class="offer">
        <strong>Sponsored offer</strong>
        <span>Explore an offer selected by our advertising partner.</span>
        <br />
        <a
          href="https://www.effectivecpmnetwork.com/fdbevfgti9?key=298b4af6566d549d90df0324902d2e59"
          rel="nofollow sponsored"
        >View sponsored offer</a>
      </div>
    </main>
  </body>
</html>
