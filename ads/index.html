<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>GameFeed Sponsored Placement</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #090611;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .placement {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 38px 22px 22px;
        background:
          radial-gradient(circle at 10% 10%, #00d9ff22, transparent 38%),
          radial-gradient(circle at 90% 90%, #ff3bdd28, transparent 40%),
          #090611;
        text-align: center;
      }
      .loading { color: #aaa4bd; font-size: 12px; letter-spacing: 0.02em; }
      .loading[hidden] { display: none; }
      iframe { max-width: 100% !important; }
    </style>
  </head>
  <body>
    <main class="placement" id="ad-placement" aria-label="Sponsored content">
      <div class="loading">Loading sponsored content&hellip;</div>
    </main>
    <script>
      (() => {
        const loading = document.querySelector(".loading");
        let readyReported = false;
        const hideLoadingWhenReady = () => {
          if (!document.querySelector("iframe")) return;
          loading.hidden = true;
          if (!readyReported && window.flutter_inappwebview) {
            readyReported = true;
            window.flutter_inappwebview.callHandler("gameFeedAdReady");
          }
        };
        new MutationObserver(hideLoadingWhenReady).observe(document.body, {
          childList: true,
          subtree: true,
        });
        hideLoadingWhenReady();
      })();
    </script>
    <script src="https://pl30234834.effectivecpmnetwork.com/0c/1b/a8/0c1ba8dc70a28a060a2bd22618fd4805.js"></script>
  </body>
</html>
